<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetFriendly</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
    }

    /* ---------------------- PÁGINA DE INICIO ---------------------- */

    header {
      background: #7b2cbf;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #5a189a;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .categories {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 180px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card span {
      font-size: 50px;
      display: block;
      margin-bottom: 10px;
    }

    .info {
      padding: 40px 20px;
      text-align: center;
      background: #f3e9ff;
    }

    .info h3 {
      color: #5a189a;
      margin-bottom: 10px;
    }

    footer {
      background: #7b2cbf;
      color: white;
      text-align: center;
      padding: 12px;
      margin-top: 40px;
    }

    /* ---------------------- CHATBOT ---------------------- */

    .chat-bubble {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #7b2cbf;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: background 0.3s;
      z-index: 1000;
      font-size: 30px;
    }

    .chat-bubble:hover {
      background: #5a189a;
    }

    .chat-container {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 100%;
      max-width: 380px;
      height: 500px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      overflow: hidden;
    }

    .chat-container.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .chat-header {
      background: #7b2cbf;
      color: #fff;
      padding: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      position: relative;
    }

    .close-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #f4f4f4;
    }

    .message {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      background-color: #d1e7ff;
      margin-left: auto;
    }

    .bot {
      background-color: #e9ecef;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ccc;
      background: #fff;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .input-area button {
      padding: 12px 16px;
      background: #7b2cbf;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    .input-area button:hover {
      background: #5a189a;
    }

    @media (max-width: 480px) {
      .chat-container {
        right: 10px;
        left: 10px;
        height: 70vh;
      }
    }
  </style>
</head>

<body>

  <!-- ---------------------- PÁGINA DE INICIO ---------------------- -->

  <header>
    <h1>🐶 PetFriendly</h1>
  </header>

  <section class="hero">
    <h2>Encuentra a tu nuevo mejor amigo</h2>
    <p>Adopta perros y gatos que buscan un hogar lleno de amor.</p>
  </section>

  <section class="categories">
    <div class="card">
      <span>🐶</span>
      <strong>Perros</strong>
    </div>

    <div class="card">
      <span>🐱</span>
      <strong>Gatos</strong>
    </div>
  </section>

  <section class="info">
    <h3>¿Por qué adoptar?</h3>
    <p>Le das una segunda oportunidad a un animal que lo necesita y ganas un compañero fiel.</p>
  </section>

  <footer>
    © 2026 PetFriendly - Todos los derechos reservados
  </footer>

  <!-- ---------------------- CHATBOT ---------------------- -->

  <button class="chat-bubble" id="chatToggle" aria-label="Abrir chat">🐶</button>

  <div class="chat-container" id="chatContainer" role="dialog" aria-modal="true">
    <div class="chat-header">
      <span id="chatTitle">PetFriendly Bot</span>
      <button class="close-btn" id="closeChat" aria-label="Cerrar chat">✖</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Escribe tu mensaje..." />
      <button id="sendBtn">Enviar</button>
    </div>
  </div>

  <script>
    const chatToggle = document.getElementById("chatToggle");
    const chatContainer = document.getElementById("chatContainer");
    const closeChat = document.getElementById("closeChat");
    const messages = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.classList.add("message", sender);
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addButtons(options) {
      const container = document.createElement("div");
      container.classList.add("message", "bot");

      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.textContent = opt.label;
        btn.style.margin = "4px";
        btn.style.padding = "6px 10px";
        btn.style.border = "none";
        btn.style.borderRadius = "6px";
        btn.style.background = "#7b2cbf";
        btn.style.color = "white";
        btn.style.cursor = "pointer";
        btn.style.fontSize = "13px";

        btn.addEventListener("mouseover", () => btn.style.background = "#5a189a");
        btn.addEventListener("mouseout", () => btn.style.background = "#7b2cbf");

        btn.addEventListener("click", () => {
          addMessage(opt.label, "user");
          setTimeout(() => {
            const respuesta = botResponse(opt.value);
            addMessage(respuesta.texto, "bot");
            if (respuesta.botones) addButtons(respuesta.botones);
          }, 300);
        });

        container.appendChild(btn);
      });

      messages.appendChild(container);
      messages.scrollTop = messages.scrollHeight;
    }

    function botResponse(input) {
      const msg = input.toLowerCase();

      if (msg.includes("hola") || msg.includes("mascota") || msg.includes("adoptar")) {
        return {
          texto: "¿Qué tipo de mascota te gustaría adoptar?",
          botones: [
            { label: "🐶 Perro", value: "perro" },
            { label: "🐱 Gato", value: "gato" }
          ]
        };
      }

      if (msg === "perro") {
        return {
          texto: "¡Los perros son increíbles! ¿Qué edad prefieres?",
          botones: [
            { label: "Cachorro", value: "cachorro perro" },
            { label: "Adulto", value: "adulto perro" },
            { label: "Senior", value: "senior perro" }
          ]
        };
      }

      if (msg === "gato") {
        return {
          texto: "¡Los gatos son maravillosos! ¿Qué edad prefieres?",
          botones: [
            { label: "Cachorro", value: "cachorro gato" },
            { label: "Adulto", value: "adulto gato" },
            { label: "Senior", value: "senior gato" }
          ]
        };
      }

      if (msg.includes("cachorro") || msg.includes("adulto") || msg.includes("senior")) {
        return {
          texto: "¿Qué tamaño te gustaría?",
          botones: [
            { label: "Pequeño", value: "pequeño" },
            { label: "Mediano", value: "mediano" },
            { label: "Grande", value: "grande" }
          ]
        };
      }

      if (msg.includes("pequeño") || msg.includes("mediano") || msg.includes("grande")) {
        return {
          texto: "Perfecto. ¿Quieres ver mascotas disponibles?",
          botones: [
            { label: "Sí, ver opciones", value: "ver opciones" },
            { label: "No, otra cosa", value: "otra cosa" }
          ]
        };
      }

      if (msg.includes("ver opciones")) {
        return {
          texto: "Puedes ver mascotas disponibles en la sección de adopciones de PetFriendly. ¿Quieres saber los requisitos?",
          botones: [
            { label: "Requisitos", value: "requisitos" },
            { label: "Proceso", value: "proceso" }
          ]
        };
      }

      if (msg.includes("requisitos")) {
        return {
          texto: "Para adoptar necesitas: ser mayor de edad, espacio adecuado, compromiso de cuidado y llenar un formulario. ¿Quieres conocer el proceso?",
          botones: [
            { label: "Proceso", value: "proceso" }
          ]
        };
      }

      if (msg.includes("proceso")) {
        return {
          texto: "El proceso es: 1) elegir mascota, 2) entrevista, 3) visita domiciliaria, 4) firma de adopción. ¿Quieres hablar con un asesor?",
          botones: [
            { label: "Hablar con asesor", value: "asesor" },
            { label: "Seguir buscando", value: "mascota" }
          ]
        };
      }

      if (msg.includes("asesor")) {
        return {
          texto: "Puedes contactar un asesor desde la app en la sección 'Soporte'. ¿Quieres seguir buscando mascotas?",
          botones: [
            { label: "Sí", value: "mascota" },
            { label: "No", value: "no" }
          ]
        };
      }

      return {
        texto: "No entendí muy bien 🐾 ¿Buscas perro o gato?",
        botones: [
          { label: "🐶 Perro", value: "perro" },
          { label: "🐱 Gato", value: "gato" }
        ]
      };
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      userInput.value = "";

      const respuesta = botResponse(text);

      setTimeout(() => {
        addMessage(respuesta.texto, "bot");
        if (respuesta.botones) addButtons(respuesta.botones);
      }, 400);
    }

    chatToggle.addEventListener("click", () => {
      chatContainer.classList.add("active");
      userInput.focus();
    });

    closeChat.addEventListener("click", () => {
      chatContainer.classList.remove("active");
      messages.innerHTML = "";
    });

    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    (function init() {
      addMessage("¡Hola! Soy el asistente de PetFriendly 🐾 ¿Quieres adoptar un perro o un gato?", "bot");
      addButtons([
        { label: "🐶 Perro", value: "perro" },
        { label: "🐱 Gato", value: "gato" }
      ]);
    })();
  </script>

</body>
</html>
